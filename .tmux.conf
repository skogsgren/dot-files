set -g mouse on
set -s escape-time 10
set -g status-position top
set -g set-titles on
set-option -g set-titles-string "#W"
set-option -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# screen prefix
set-option -g prefix C-a
unbind-key C-b
bind-key a send-prefix
bind-key C-a last-window

# open pane in same directory
bind-key -n M-c run-shell "~/.tmux/plugins/tmux-layouts/scripts/new_pane.sh"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g pane-border-status off
set -g pane-border-lines heavy
set -g pane-border-style fg=colour250
set -g pane-active-border-style fg=#000000,bg=#fdd50e

set-hook -g pane-exited \
  'if-shell "[ #{window_panes} -eq 1 ]" \
    "set -w pane-border-status off" \
    "set -w pane-border-status top"'

set-hook -g after-split-window \
  'set -w pane-border-status top'

set-hook -g after-split-window \
  'set -w pane-border-status top'

bind-key -n M-t new-window
bind-key -n M-n next-window
bind-key -n M-p previous-window
bind-key -n M-a last-window

bind-key -n M-, command-prompt -I "#W" "rename-window '%%'"
bind -n M-- swap-window -t -1 \; select-window -t -1
bind -n M-= swap-window -t +1 \; select-window -t +1

bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-< resize-pane -L 10
bind-key -n M-> resize-pane -R 10

bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vim keybindings
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind < resize-pane -L 10
bind > resize-pane -R 10
bind - resize-pane -D 10
bind + resize-pane -U 10

set -g status-style "bg=default"
set -g window-status-current-style "bg=default,reverse"
set -g window-status-separator ''
set -g window-status-format "  #{?window_start_flag,, }#I:#W#{?window_flags,#F, }  "
set -g window-status-current-format "  #{?window_start_flag,, }#I:#W#{?window_flags,#F, }  "
set -g status-left ""
set -g status-right '#[bg=cyan]#{?client_prefix,  *  ,}#[default] %H:%M'
set -g status-keys emacs
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -s set-clipboard on
set -s copy-command "xclip -selection c"

# plugin stuff
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'emretuna/tmux-layouts'
set -g @tmux_layouts_default "spiral"

run '~/.tmux/plugins/tpm/tpm'
